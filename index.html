<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작가 정보 허브 — 단톡방 모음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2EC;
    --surface: #FDFBF7;
    --surface2: #EDE9E0;
    --ink: #1A1713;
    --ink2: #5A5650;
    --ink3: #9A958E;
    --accent: #C8510A;
    --accent-light: #F5E6DC;
    --border: rgba(26,23,19,0.1);
    --border2: rgba(26,23,19,0.06);

    --cat-인쇄제본: #1B4F8A;
    --cat-인쇄제본-bg: #E8F0FA;
    --cat-유통판매: #1A6B3A;
    --cat-유통판매-bg: #E4F3EA;
    --cat-북페어행사: #7A3A00;
    --cat-북페어행사-bg: #FAF0E4;
    --cat-펀딩: #5C2D8C;
    --cat-펀딩-bg: #F0E9FA;
    --cat-출판등록: #0A5C5C;
    --cat-출판등록-bg: #E4F5F5;
    --cat-디자인굿즈: #8C1D4A;
    --cat-디자인굿즈-bg: #FAE8EF;
    --cat-지원사업: #6B3A00;
    --cat-지원사업-bg: #FAF0E4;
    --cat-커뮤니티: #3D3830;
    --cat-커뮤니티-bg: #F0EDE8;
    --cat-기술AI: #8C1A1A;
    --cat-기술AI-bg: #FAE8E8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 0 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1.5rem;
  }
  .site-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .site-title .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
  }
  .site-sub {
    font-size: 12px;
    color: var(--ink3);
    margin-top: 2px;
    margin-bottom: 1.25rem;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin-bottom: 1rem;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink3);
    pointer-events: none;
  }
  #searchInput {
    width: 100%;
    padding: 11px 14px 11px 42px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--ink3); }

  /* TABS */
  .tabs-wrap {
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 2px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border2);
  }
  .tab {
    padding: 8px 14px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    margin-bottom: -1px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }
  .tab .n {
    font-size: 11px;
    color: var(--ink3);
    margin-left: 3px;
  }
  .tab.active .n { color: var(--accent); opacity: 0.7; }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem 4rem;
  }

  .results-meta {
    font-size: 12px;
    color: var(--ink3);
    margin-bottom: 1rem;
  }

  /* CARDS */
  .cards {
    display: grid;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .card:hover {
    border-color: var(--border);
    box-shadow: 0 2px 12px rgba(26,23,19,0.07);
  }
  .card.expanded {
    border-color: var(--border);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    justify-content: space-between;
  }
  .card-left { display: flex; align-items: flex-start; gap: 10px; flex: 1; min-width: 0; }

  .cat-badge {
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 1px;
  }

  .card-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.45;
  }

  .chevron {
    flex-shrink: 0;
    color: var(--ink3);
    transition: transform 0.2s;
    margin-top: 2px;
  }
  .card.expanded .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border2);
  }
  .card.expanded .card-body { display: block; }

  .card-text {
    font-size: 13.5px;
    color: var(--ink2);
    line-height: 1.75;
    white-space: pre-line;
  }
  .card-meta {
    font-size: 11.5px;
    color: var(--ink3);
    margin-top: 10px;
    font-style: italic;
  }

  /* highlight */
  mark {
    background: #FFE58A;
    color: var(--ink);
    border-radius: 2px;
    padding: 0 1px;
  }

  .no-results {
    text-align: center;
    padding: 4rem 0;
    color: var(--ink3);
    font-size: 14px;
  }
  .no-results span {
    display: block;
    font-size: 2rem;
    margin-bottom: 1rem;
  }

  /* Cat colors */
  .badge-인쇄제본 { background: var(--cat-인쇄제본-bg); color: var(--cat-인쇄제본); }
  .badge-유통판매 { background: var(--cat-유통판매-bg); color: var(--cat-유통판매); }
  .badge-북페어행사 { background: var(--cat-북페어행사-bg); color: var(--cat-북페어행사); }
  .badge-펀딩 { background: var(--cat-펀딩-bg); color: var(--cat-펀딩); }
  .badge-출판등록 { background: var(--cat-출판등록-bg); color: var(--cat-출판등록); }
  .badge-디자인굿즈 { background: var(--cat-디자인굿즈-bg); color: var(--cat-디자인굿즈); }
  .badge-지원사업 { background: var(--cat-지원사업-bg); color: var(--cat-지원사업); }
  .badge-커뮤니티 { background: var(--cat-커뮤니티-bg); color: var(--cat-커뮤니티); }
  .badge-기술AI { background: var(--cat-기술AI-bg); color: var(--cat-기술AI); }

  @media (max-width: 600px) {
    .site-title { font-size: 1.2rem; }
    .card { padding: 13px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="site-title"><span class="dot"></span>작가 정보 허브</div>
    <div class="site-sub">단톡방에서 모은 독립출판 실전 정보 · 2025–2026</div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">

    </div>
    <div class="tabs-wrap">
      <div class="tabs" id="tabs"></div>
    </div>
  </div>
</header>

<main>
  <div class="results-meta" id="meta"></div>
  <div class="cards" id="cards"></div>
</main>

const CATS = ["전체", ...Array.from(new Set(DATA.map(d => d.cat)))];
let activeTab = "전체";
let expandedIdx = null;

function highlight(text, q) {
  if (!q) return text;
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(esc, 'gi'), m => `<mark>${m}</mark>`);
}

function getFiltered() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  return DATA.map((d, i) => ({...d, _i: i})).filter(d => {
    const matchCat = activeTab === "전체" || d.cat === activeTab;
    const matchQ = !q || d.title.toLowerCase().includes(q) || d.body.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}

function catCount(cat) {
  if (cat === "전체") return DATA.length;
  return DATA.filter(d => d.cat === cat).length;
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = CATS.map(cat =>
    `<button class="tab ${cat === activeTab ? 'active' : ''}" onclick="setTab('${cat}')">${cat}<span class="n">${catCount(cat)}</span></button>`
  ).join('');
}

function renderCards() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const filtered = getFiltered();
  document.getElementById("meta").textContent = `${filtered.length}개 항목`;

  if (filtered.length === 0) {
    document.getElementById("cards").innerHTML = `<div class="no-results"><span>🔍</span>검색 결과가 없습니다</div>`;
    return;
  }

  document.getElementById("cards").innerHTML = filtered.map((d) => {
    const isExp = expandedIdx === d._i;
    return `
    <div class="card ${isExp ? 'expanded' : ''}" onclick="toggle(${d._i})">
      <div class="card-top">
        <div class="card-left">
          <span class="cat-badge badge-${d.cat}">${d.cat}</span>
          <span class="card-title">${highlight(d.title, q)}</span>
        </div>
        <svg class="chevron" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M4 6l4 4 4-4"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-text">${highlight(d.body.replace(/\n/g, '<br>'), q)}</div>
        <div class="card-meta">${d.meta}</div>
      </div>
    </div>`;
  }).join('');
}

function toggle(idx) {
  expandedIdx = expandedIdx === idx ? null : idx;
  renderCards();
}

function setTab(cat) {
  activeTab = cat;
  expandedIdx = null;
  renderTabs();
  renderCards();
}

document.getElementById("searchInput").addEventListener("input", () => {
  expandedIdx = null;
  renderCards();
});

renderTabs();
renderCards();
</script>
